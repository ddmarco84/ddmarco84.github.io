<style>
#nav-network {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  z-index: 1;
  overflow: hidden;
}
</style>
<div id="nav-network"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script>
const NODES = 40;
const LINK_DISTANCE = 110;
const SPEED = 0.35;
const NODE_SIZE = 2;
const LINE_BASE_ALPHA = 120;
const LINE_MAX_THICK = 1.6;
const LINE_MIN_THICK = 0.3;
const FG_COLOR = [255, 255, 255];
const BG_COLOR = [30, 30, 30];
const HEIGHT = 60;
let nodes = [];
let holder;
let c;
function setup() {
  holder = document.getElementById('nav-network');
  c = createCanvas(windowWidth, HEIGHT);
  c.parent(holder);
  pixelDensity(1);
  initNodes();
}
function windowResized() {
  resizeCanvas(windowWidth, HEIGHT);
}
function initNodes() {
  nodes = [];
  for (let i = 0; i < NODES; i++) {
    nodes.push({
      x: random(width),
      y: random(HEIGHT),
      vx: random(-SPEED, SPEED),
      vy: random(-SPEED, SPEED)
    });
  }
}
function draw() {
  background(BG_COLOR[0], BG_COLOR[1], BG_COLOR[2]);
  for (let n of nodes) {
    n.x += n.vx;
    n.y += n.vy;
    n.vx += random(-0.02, 0.02);
    n.vy += random(-0.02, 0.02);
    n.vx = constrain(n.vx, -SPEED, SPEED);
    n.vy = constrain(n.vy, -SPEED, SPEED);
    if (n.x < 0) n.x += width;
    if (n.x > width) n.x -= width;
    if (n.y < 0) n.y += HEIGHT;
    if (n.y > HEIGHT) n.y -= HEIGHT;
  }
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const d = dist(a.x, a.y, b.x, b.y);
      if (d < LINK_DISTANCE) {
        const t = 1 - d / LINK_DISTANCE;
        const alpha = LINE_BASE_ALPHA * t;
        const w = LINE_MIN_THICK + t * (LINE_MAX_THICK - LINE_MIN_THICK);
        strokeWeight(w);
        stroke(FG_COLOR[0], FG_COLOR[1], FG_COLOR[2], alpha);
        line(a.x, a.y, b.x, b.y);
      }
    }
  }
  noStroke();
  fill(FG_COLOR[0], FG_COLOR[1], FG_COLOR[2]);
  for (let n of nodes) circle(n.x, n.y, NODE_SIZE);
}
</script>
